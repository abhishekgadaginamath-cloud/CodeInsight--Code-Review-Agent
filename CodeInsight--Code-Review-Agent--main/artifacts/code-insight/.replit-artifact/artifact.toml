kind = "web"
previewPath = "/"
title = "Code Insight"
version = "1.0.0"
id = "artifacts/code-insight"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18742

[services.development]
run = "pnpm --filter @workspace/code-insight run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/code-insight", "run", "build" ]
publicDir = "artifacts/code-insight/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18742"
BASE_PATH = "/"
